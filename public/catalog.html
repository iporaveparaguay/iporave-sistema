<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Catálogo — IPORÃVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,'DM Sans',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{background:linear-gradient(135deg,#1e1b4b 0%,#1a1d40 100%);padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 16px rgba(0,0,0,.5);position:sticky;top:0;z-index:200;}
.hdr-logo{background:linear-gradient(135deg,#f5a623,#e8920a);border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(245,166,35,.4);}
.hdr-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.hdr-sub{font-size:11px;color:#fbbf24;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-flag{font-size:22px;}
.carrito-fab{background:#f5a623;color:#1a1a1a;border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;box-shadow:0 2px 8px rgba(245,166,35,.4);transition:opacity .15s;}
.carrito-fab:hover{opacity:.85;}
.carrito-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:50%;font-size:10px;font-weight:700;width:18px;height:18px;display:none;align-items:center;justify-content:center;line-height:1;}
.carrito-badge.visible{display:flex;}

/* FILTROS */
.filtros-wrap{background:#151827;border-bottom:1px solid #1e2235;padding:12px 14px;display:flex;gap:8px;flex-wrap:wrap;}
.filtros-wrap input,.filtros-wrap select{background:#0f172a;border:1.5px solid #1e2235;color:#e2e8f0;padding:9px 12px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.filtros-wrap input:focus,.filtros-wrap select:focus{border-color:#f5a623;}
.filtros-wrap input::placeholder{color:#475569;}
.filtros-wrap select option{background:#151827;}
#searchInput{flex:2;min-width:160px;}
#selectCat,#selectOrden{flex:1;min-width:130px;}
.precio-row{display:flex;gap:8px;flex:1;min-width:200px;}
.precio-row input{flex:1;min-width:0;}

/* STATS */
.stats-bar{padding:10px 14px 4px;display:flex;align-items:center;gap:8px;}
.stats-count{font-size:12px;color:#64748b;font-weight:600;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 14px 100px;}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.grid{grid-template-columns:repeat(4,1fr);gap:16px;padding:14px 24px 120px;}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(5,1fr);}}

/* PRODUCT CARD */
.prod-card{background:#151827;border:1px solid #1e2235;border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;display:flex;flex-direction:column;}
.prod-card:hover{transform:translateY(-3px);border-color:#f5a623;box-shadow:0 8px 24px rgba(245,166,35,.15);}
.prod-card:active{transform:scale(.97);}
.prod-img-wrap{aspect-ratio:1;overflow:hidden;background:#1e2235;}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s;}
.prod-card:hover .prod-img-wrap img{transform:scale(1.05);}
.prod-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;color:#374151;}
.prod-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px;}
.prod-cat{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.prod-name{font-size:13px;font-weight:700;color:#f1f5f9;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.prod-price-old{font-size:11px;color:#64748b;text-decoration:line-through;}
.prod-price{font-size:15px;font-weight:800;color:#f5a623;margin-top:auto;}
.prod-actions{display:flex;flex-direction:column;gap:6px;padding:0 10px 10px;}
.btn-ver{background:linear-gradient(90deg,#f5a623,#e8920a);color:#1a1a1a;border:none;border-radius:8px;padding:9px 0;font-size:12px;font-weight:800;cursor:pointer;width:100%;transition:opacity .15s;min-height:40px;}
.btn-ver:hover{opacity:.88;}
.btn-agregar{background:transparent;color:#f5a623;border:1px solid #f5a623;border-radius:8px;padding:7px 0;font-size:12px;font-weight:700;cursor:pointer;width:100%;transition:background .15s,color .15s;min-height:38px;}
.btn-agregar:hover,.btn-agregar.en-carrito{background:#f5a623;color:#1a1a1a;}
.btn-compartir{background:transparent;color:#64748b;border:none;font-size:11px;cursor:pointer;padding:4px;width:100%;transition:color .15s;}
.btn-compartir:hover{color:#94a3b8;}

/* SKELETON */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton-card{background:#151827;border:1px solid #1e2235;border-radius:14px;overflow:hidden;}
.sk-img{aspect-ratio:1;background:linear-gradient(90deg,#1e2235 25%,#252a40 50%,#1e2235 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear;}
.sk-body{padding:10px;display:flex;flex-direction:column;gap:8px;}
.sk-line{border-radius:6px;background:linear-gradient(90deg,#1e2235 25%,#252a40 50%,#1e2235 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear;}
.sk-line.t{height:13px;width:85%;}
.sk-line.c{height:10px;width:50%;}
.sk-line.p{height:16px;width:55%;margin-top:4px;}
.sk-btn{margin:0 10px 10px;height:34px;border-radius:8px;background:linear-gradient(90deg,#1e2235 25%,#252a40 50%,#1e2235 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear;}

/* EMPTY / ERROR */
#emptyState{display:none;text-align:center;padding:60px 20px;color:#4b5563;}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:700;color:#64748b;margin-bottom:6px;}
.empty-sub{font-size:13px;}
#errorState{display:none;text-align:center;padding:48px 20px;color:#f87171;}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;}}

/* MODAL SHEET (detalle + pedido) */
.modal-sheet{background:#151827;border:1px solid #1e2235;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px);animation:slideUp .25s ease-out;}
@media(min-width:600px){.modal-sheet{border-radius:20px;animation:fadeIn .2s ease-out;}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#334155;border-radius:2px;margin:12px auto 0;}
.modal-close-btn{position:absolute;top:14px;right:16px;background:#1e2235;border:none;color:#94a3b8;font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2;}
.modal-close-btn:hover{background:#334155;}
.modal-img-wrap{position:relative;width:100%;aspect-ratio:16/10;background:#1e2235;overflow:hidden;}
.modal-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.modal-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;color:#374151;}
.modal-body{padding:18px 18px 0;}
.modal-cat{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:6px;}
.modal-name{font-size:20px;font-weight:800;color:#f1f5f9;margin-bottom:4px;line-height:1.3;}
.modal-price-old{font-size:13px;color:#64748b;text-decoration:line-through;margin-bottom:2px;}
.modal-price{font-size:26px;font-weight:900;color:#f5a623;margin-bottom:14px;}
.modal-desc{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:18px;white-space:pre-wrap;max-height:28vh;overflow-y:auto;}
.modal-divider{height:1px;background:#1e2235;margin:0 -18px 18px;}
.modal-section-title{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px;}
.form-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:5px;display:block;}
.form-input{width:100%;background:#0f172a;border:1.5px solid #1e2235;border-radius:10px;padding:11px 14px;font-size:15px;color:#e2e8f0;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:14px;}
.form-input:focus{border-color:#f5a623;}
.form-input::placeholder{color:#475569;}
.form-row{display:flex;gap:10px;}
.form-row .form-input{flex:1;}
.form-actions{display:flex;gap:10px;margin-bottom:18px;}
.btn-cancel{flex:1;background:transparent;color:#94a3b8;border:1px solid #334155;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-cancel:hover{background:#1e2235;}
.wa-btn{flex:2;background:linear-gradient(90deg,#25d366,#1eba56);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.wa-btn:hover{opacity:.9;}
.form-note{font-size:11px;color:#374151;text-align:center;margin-top:-8px;margin-bottom:16px;}
.modal-detalle-actions{display:flex;gap:10px;margin-bottom:18px;}
.btn-pedir-ahora{flex:2;background:linear-gradient(90deg,#f5a623,#e8920a);color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;transition:opacity .15s;}
.btn-pedir-ahora:hover{opacity:.88;}
.btn-agregar-modal{flex:1;background:transparent;color:#f5a623;border:1.5px solid #f5a623;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s,color .15s;}
.btn-agregar-modal:hover,.btn-agregar-modal.en-carrito{background:#f5a623;color:#1a1a1a;}

/* DRAWER CARRITO */
.carrito-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;}
.carrito-overlay.open{display:block;}
.carrito-drawer{position:fixed;top:0;right:-400px;width:360px;max-width:95vw;height:100%;background:#151827;border-left:1px solid #1e2235;z-index:401;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 30px rgba(0,0,0,.4);}
.carrito-drawer.open{right:0;}
.carrito-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid #1e2235;flex-shrink:0;}
.carrito-titulo{font-size:16px;font-weight:800;color:#f1f5f9;display:flex;align-items:center;gap:8px;}
.carrito-sub{font-size:11px;color:#64748b;margin-top:2px;}
.btn-cerrar-carrito{background:transparent;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s;min-height:40px;}
.btn-cerrar-carrito:hover{background:#1e2235;}
.carrito-lista{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.carrito-item{background:#0f172a;border:1px solid #1e2235;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.carrito-item-info{flex:1;min-width:0;}
.carrito-item-nombre{font-size:13px;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.carrito-item-precio{font-size:12px;color:#f5a623;margin-top:3px;}
.carrito-item-cant{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.carrito-item-cant button{background:#1e2235;border:1px solid #334155;color:#e2e8f0;border-radius:7px;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.carrito-item-cant button:hover{background:#f5a623;color:#1a1a1a;border-color:#f5a623;}
.carrito-item-cant span{font-size:14px;font-weight:700;min-width:20px;text-align:center;}
.btn-quitar{background:transparent;border:none;color:#ef4444;font-size:16px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;flex-shrink:0;}
.btn-quitar:hover{background:rgba(239,68,68,.1);}
.carrito-vacio{text-align:center;color:#64748b;padding:48px 20px;font-size:14px;}
.carrito-vacio-icon{font-size:48px;margin-bottom:12px;}
.carrito-footer{border-top:1px solid #1e2235;padding:16px 20px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
.carrito-total{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700;color:#f1f5f9;}
.carrito-total-monto{color:#f5a623;font-size:18px;}
.btn-vaciar{background:transparent;border:1px solid #ef4444;color:#ef4444;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s,color .2s;min-height:40px;}
.btn-vaciar:hover{background:#ef4444;color:#fff;}
.btn-enviar-carrito{background:linear-gradient(90deg,#25d366,#1eba56);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;width:100%;min-height:48px;transition:opacity .15s;}
.btn-enviar-carrito:hover{opacity:.9;}

/* BOTÓN VOLVER ARRIBA */
.btn-top{position:fixed;bottom:24px;left:20px;z-index:150;background:#1e2235;color:#94a3b8;border:1px solid #334155;border-radius:50%;width:42px;height:42px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateY(10px);}
.btn-top.visible{opacity:1;pointer-events:auto;transform:translateY(0);}
.btn-top:hover{background:#334155;color:#e2e8f0;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid #334155;border-radius:12px;padding:11px 20px;font-size:14px;font-weight:600;color:#f1f5f9;z-index:500;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* FOOTER */
footer{border-top:1px solid #1e2235;background:#151827;padding:18px 20px;text-align:center;margin-top:auto;}
footer nav{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:10px;}
footer nav a{color:#f5a623;text-decoration:none;font-size:13px;font-weight:600;transition:opacity .15s;}
footer nav a:hover{opacity:.75;}
footer p{color:#374151;font-size:11px;}

/* RESPONSIVE */
@media(max-width:480px){
  .filtros-wrap{flex-direction:column;}
  #searchInput,#selectCat,#selectOrden,.precio-row{min-width:0;width:100%;flex:none;}
  .precio-row{width:100%;}
  .form-row{flex-direction:column;}
}
</style>
</head>
<body>

<header>
  <div class="hdr-logo">I</div>
  <div><div class="hdr-title">IPORÃVE</div><div class="hdr-sub">Catálogo de productos</div></div>
  <div class="hdr-right">
    <button class="carrito-fab" id="carritoFab" onclick="abrirCarrito()" title="Ver carrito">
      🛒
      <span class="carrito-badge" id="carritoBadge">0</span>
    </button>
    <div class="hdr-flag">🇵🇾</div>
  </div>
</header>

<div class="filtros-wrap">
  <input type="search" id="searchInput" placeholder="Buscar productos..." oninput="filtrar()" autocomplete="off">
  <select id="selectCat" onchange="filtrar()"><option value="">Todas las categorías</option></select>
  <select id="selectOrden" onchange="filtrar()">
    <option value="">Ordenar</option>
    <option value="precio_menor">Menor precio</option>
    <option value="precio_mayor">Mayor precio</option>
    <option value="nombre_az">Nombre A-Z</option>
  </select>
  <div class="precio-row">
    <input type="number" id="inputMin" placeholder="Precio mín." oninput="filtrar()" min="0" step="1000" class="form-input" style="margin-bottom:0">
    <input type="number" id="inputMax" placeholder="Precio máx." oninput="filtrar()" min="0" step="1000" class="form-input" style="margin-bottom:0">
  </div>
</div>

<div class="stats-bar"><span class="stats-count" id="statsCount"></span></div>

<div class="grid" id="grid"></div>
<div id="emptyState"><div class="empty-icon">📦</div><div class="empty-title">Sin resultados</div><div class="empty-sub">Probá con otros términos o filtros</div></div>
<div id="errorState"></div>

<!-- MODAL DETALLE / PEDIDO (compartido) -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div style="position:relative">
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
      <div class="modal-img-wrap" id="modalImgWrap"></div>
    </div>
    <div class="modal-body">
      <div class="modal-cat" id="modalCat"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price-old" id="modalPriceOld" style="display:none"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-detalle-actions" id="modalDetalleActions">
        <button class="btn-agregar-modal" id="btnAgregarModal" onclick="agregarDesdeModal()">🛒 Agregar</button>
        <button class="btn-pedir-ahora" onclick="showFormulario()">📲 Pedir ahora</button>
      </div>
      <!-- Formulario oculto hasta hacer click en "Pedir ahora" -->
      <div id="modalFormWrap" style="display:none">
        <div class="modal-divider"></div>
        <div class="modal-section-title">📬 Completá tus datos para el pedido</div>
        <label class="form-label" for="clienteNombre">Tu nombre</label>
        <input class="form-input" id="clienteNombre" type="text" placeholder="Ej: María González" autocomplete="name">
        <div class="form-row">
          <div style="flex:1">
            <label class="form-label" for="clienteTel">Teléfono / WhatsApp</label>
            <input class="form-input" id="clienteTel" type="tel" placeholder="09xxxxxxxx" autocomplete="tel">
          </div>
          <div style="flex:1">
            <label class="form-label" for="clienteCant">Cantidad</label>
            <input class="form-input" id="clienteCant" type="number" value="1" min="1" max="99">
          </div>
        </div>
        <label class="form-label" for="clienteDireccion">Dirección de entrega</label>
        <input class="form-input" id="clienteDireccion" type="text" placeholder="Barrio, calle y número" autocomplete="street-address">
        <div class="form-actions">
          <button class="btn-cancel" onclick="hideFormulario()">Volver</button>
          <button class="wa-btn" onclick="enviarPedido()">
            <span>📲</span> Pedir por WhatsApp
          </button>
        </div>
        <div class="form-note">Te contactaremos para confirmar disponibilidad y coordinar entrega</div>
      </div>
    </div>
  </div>
</div>

<!-- DRAWER CARRITO -->
<div class="carrito-overlay" id="carritoOverlay" onclick="cerrarCarrito()"></div>
<div class="carrito-drawer" id="carritoDrawer">
  <div class="carrito-hdr">
    <div>
      <div class="carrito-titulo">🛒 Mi carrito</div>
      <div class="carrito-sub" id="carritoSub"></div>
    </div>
    <button class="btn-cerrar-carrito" onclick="cerrarCarrito()">✕ Cerrar</button>
  </div>
  <div class="carrito-lista" id="carritoLista"></div>
  <div class="carrito-footer" id="carritoFooter" style="display:none">
    <div class="carrito-total">
      <span>Total estimado</span>
      <span class="carrito-total-monto" id="carritoTotal">Gs. 0</span>
    </div>
    <button class="btn-vaciar" onclick="vaciarCarrito()">🗑 Vaciar carrito</button>
    <button class="btn-enviar-carrito" onclick="enviarCarritoPorWA()">📲 Enviar pedido por WhatsApp</button>
  </div>
</div>

<!-- Volver arriba -->
<button class="btn-top" id="btnTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Volver arriba">↑</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<footer>
  <nav>
    <a href="/track.html">📦 Rastreá tu pedido</a>
    <a href="/contacto.html">💬 Contacto</a>
    <a href="/terminos.html">📄 Términos</a>
  </nav>
  <p>© 2026 Iporãve — Paraguay 🇵🇾</p>
</footer>

<script>
const API = 'https://iporave-api.iporaveparaguay.workers.dev';
const WA_VENDEDOR = '595981000000'; // actualizar con el número real del vendedor

let todosLosProductos = [];
let productoActual = null;
let _carrito = [];
const CARRITO_KEY = 'iporave-carrito-v2';

// ─── UTILIDADES ──────────────────────────────────────────────
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function safeUrl(u){return(typeof u==='string'&&/^https?:\/\//i.test(u))?u:'';}
function fmt(n){return Number(n||0).toLocaleString('es-PY',{minimumFractionDigits:0,maximumFractionDigits:0});}
function showToast(msg,ms=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}

// ─── CARRITO ─────────────────────────────────────────────────
(function initCarrito(){
  try{
    const g=localStorage.getItem(CARRITO_KEY);
    if(g){
      const p=JSON.parse(g);
      if(Array.isArray(p)) _carrito=p;
    }
  }catch{}
  actualizarBadge();
})();

function guardarCarrito(){try{localStorage.setItem(CARRITO_KEY,JSON.stringify(_carrito));}catch{}}

function actualizarBadge(){
  const total=_carrito.reduce((a,i)=>a+i.cantidad,0);
  const b=document.getElementById('carritoBadge');
  if(total>0){b.textContent=total>99?'99+':total;b.classList.add('visible');}
  else{b.classList.remove('visible');}
  const sub=document.getElementById('carritoSub');
  if(sub) sub.textContent=total===0?'Carrito vacío':total===1?'1 producto':total+' productos';
}

function agregarAlCarrito(id,cantidad=1){
  const p=todosLosProductos.find(x=>x.id===id);
  if(!p) return;
  const ex=_carrito.find(i=>i.id===id);
  if(ex) ex.cantidad+=cantidad;
  else _carrito.push({id:p.id,nombre:p.nombre,precio:p.precio,foto:p.foto||p.imagen||p.image||'',cantidad});
  guardarCarrito();
  actualizarBadge();
}

function cambiarCantidad(id,delta){
  const item=_carrito.find(i=>i.id===id);
  if(!item) return;
  item.cantidad+=delta;
  if(item.cantidad<=0) _carrito=_carrito.filter(i=>i.id!==id);
  guardarCarrito();
  actualizarBadge();
  renderCarrito();
}

function quitarDelCarrito(id){
  _carrito=_carrito.filter(i=>i.id!==id);
  guardarCarrito();
  actualizarBadge();
  renderCarrito();
}

function vaciarCarrito(){
  if(!_carrito.length) return;
  if(!confirm('¿Vaciar todo el carrito?')) return;
  _carrito=[];
  guardarCarrito();
  actualizarBadge();
  renderCarrito();
}

function renderCarrito(){
  const lista=document.getElementById('carritoLista');
  const footer=document.getElementById('carritoFooter');
  if(!_carrito.length){
    lista.innerHTML='<div class="carrito-vacio"><div class="carrito-vacio-icon">🛒</div>Tu carrito está vacío.<br>Agregá productos para continuar.</div>';
    footer.style.display='none';
    return;
  }
  footer.style.display='flex';
  lista.innerHTML=_carrito.map(item=>`
    <div class="carrito-item">
      <div class="carrito-item-info">
        <div class="carrito-item-nombre">${esc(item.nombre)}</div>
        <div class="carrito-item-precio">Gs. ${fmt(item.precio)} c/u</div>
      </div>
      <div class="carrito-item-cant">
        <button onclick="cambiarCantidad(${item.id},-1)" title="Quitar uno">−</button>
        <span>${item.cantidad}</span>
        <button onclick="cambiarCantidad(${item.id},1)" title="Agregar uno">+</button>
      </div>
      <button class="btn-quitar" onclick="quitarDelCarrito(${item.id})" title="Eliminar">✕</button>
    </div>`).join('');
  const total=_carrito.reduce((a,i)=>a+i.precio*i.cantidad,0);
  document.getElementById('carritoTotal').textContent='Gs. '+fmt(total);
}

function abrirCarrito(){renderCarrito();document.getElementById('carritoOverlay').classList.add('open');document.getElementById('carritoDrawer').classList.add('open');}
function cerrarCarrito(){document.getElementById('carritoOverlay').classList.remove('open');document.getElementById('carritoDrawer').classList.remove('open');}

function enviarCarritoPorWA(){
  if(!_carrito.length){alert('El carrito está vacío.');return;}
  const total=_carrito.reduce((a,i)=>a+i.precio*i.cantidad,0);
  const lineas=_carrito.map(i=>`• ${i.nombre} x${i.cantidad} = Gs. ${fmt(i.precio*i.cantidad)}`).join('\n');
  const msg='🛒 *Pedido desde Iporãve*\n\n*Productos:*\n'+lineas+'\n\n*Total: Gs. '+fmt(total)+'*\n\nPor favor confirmame disponibilidad y datos de entrega. ¡Gracias!';
  window.open('https://wa.me/'+WA_VENDEDOR+'?text='+encodeURIComponent(msg),'_blank','noopener');
}

// ─── SKELETONS ───────────────────────────────────────────────
function mostrarSkeletons(){
  const sk=`<div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line c"></div><div class="sk-line t"></div><div class="sk-line p"></div></div><div class="sk-btn"></div></div>`;
  document.getElementById('grid').innerHTML=sk.repeat(8);
  document.getElementById('grid').style.display='grid';
}

// ─── CATEGORÍAS ──────────────────────────────────────────────
function poblarCategorias(){
  const cats=[...new Set(todosLosProductos.map(p=>p.categoria).filter(Boolean))].sort();
  const sel=document.getElementById('selectCat');
  sel.innerHTML='<option value="">Todas las categorías</option>';
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
}

// ─── FILTRAR / RENDERIZAR GRID ───────────────────────────────
function filtrar(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  const cat=document.getElementById('selectCat').value;
  const orden=document.getElementById('selectOrden').value;
  let minV=parseInt(document.getElementById('inputMin').value)||0;
  let maxV=parseInt(document.getElementById('inputMax').value)||Infinity;
  if(maxV<minV) maxV=Infinity;

  let lista=[...todosLosProductos];
  if(cat) lista=lista.filter(p=>p.categoria===cat);
  if(q) lista=lista.filter(p=>(p.nombre||'').toLowerCase().includes(q)||(p.descripcion||'').toLowerCase().includes(q)||(p.categoria||'').toLowerCase().includes(q));
  lista=lista.filter(p=>(!p.precio||p.precio>=minV)&&(!p.precio||p.precio<=maxV));

  if(orden==='precio_menor') lista.sort((a,b)=>(a.precio||0)-(b.precio||0));
  else if(orden==='precio_mayor') lista.sort((a,b)=>(b.precio||0)-(a.precio||0));
  else if(orden==='nombre_az') lista.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));

  renderGrid(lista);
}

function renderGrid(lista){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('emptyState');
  const stats=document.getElementById('statsCount');

  if(!lista.length){
    grid.style.display='none';
    empty.style.display='block';
    stats.textContent='';
    return;
  }
  empty.style.display='none';
  grid.style.display='grid';
  stats.textContent=lista.length+' producto'+(lista.length!==1?'s':'');

  grid.innerHTML=lista.map(p=>{
    const imgUrl=safeUrl(p.foto||p.imagen||p.image||'');
    const imgHtml=imgUrl
      ?`<img src="${esc(imgUrl)}" alt="${esc(p.nombre)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"prod-img-placeholder\\">📦</div>'">`
      :`<div class="prod-img-placeholder">📦</div>`;
    const precioAntiguo=p.precio_comparacion&&p.precio_comparacion>p.precio
      ?`<div class="prod-price-old">Gs. ${fmt(p.precio_comparacion)}</div>`:'';
    return `<div class="prod-card" onclick="abrirModal(${p.id})">
      <div class="prod-img-wrap">${imgHtml}</div>
      <div class="prod-body">
        ${p.categoria?`<div class="prod-cat">${esc(p.categoria)}</div>`:''}
        <div class="prod-name">${esc(p.nombre)}</div>
        ${precioAntiguo}
        ${p.precio?`<div class="prod-price">Gs. ${fmt(p.precio)}</div>`:''}
      </div>
      <div class="prod-actions">
        <button class="btn-ver" onclick="event.stopPropagation();abrirModal(${p.id})">Ver y pedir</button>
        <button class="btn-agregar" data-id="${p.id}" onclick="event.stopPropagation();agregarCard(${p.id},this)">🛒 Agregar</button>
        <button class="btn-compartir" onclick="event.stopPropagation();compartirWA(${p.id})">📤 Compartir por WhatsApp</button>
      </div>
    </div>`;
  }).join('');
}

function agregarCard(id,btn){
  agregarAlCarrito(id);
  btn.classList.add('en-carrito');
  btn.textContent='✓ Agregado';
  setTimeout(()=>{btn.classList.remove('en-carrito');btn.textContent='🛒 Agregar';},1200);
  showToast('✓ Producto agregado al carrito');
}

function compartirWA(id){
  const p=todosLosProductos.find(x=>x.id===id);
  if(!p) return;
  const msg='¡Mirá este producto en Iporãve! 👇\n*'+p.nombre+'* — Gs. '+fmt(p.precio)+'\nVer catálogo: https://iporaveparaguay.com/catalog.html';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank','noopener');
}

// ─── MODAL DETALLE ────────────────────────────────────────────
function abrirModal(id){
  const p=todosLosProductos.find(x=>x.id===id);
  if(!p) return;
  productoActual=p;

  const imgUrl=safeUrl(p.foto||p.imagen||p.image||'');
  document.getElementById('modalImgWrap').innerHTML=imgUrl
    ?`<img src="${esc(imgUrl)}" alt="${esc(p.nombre)}" onerror="this.parentElement.innerHTML='<div class=\\"modal-img-placeholder\\">📦</div>'">`
    :`<div class="modal-img-placeholder">📦</div>`;

  document.getElementById('modalCat').textContent=p.categoria||'';
  document.getElementById('modalName').textContent=p.nombre||'';
  const oldEl=document.getElementById('modalPriceOld');
  if(p.precio_comparacion&&p.precio_comparacion>p.precio){oldEl.textContent='Gs. '+fmt(p.precio_comparacion);oldEl.style.display='block';}
  else{oldEl.style.display='none';}
  document.getElementById('modalPrice').textContent=p.precio?'Gs. '+fmt(p.precio):'Consultar precio';
  document.getElementById('modalDesc').textContent=p.descripcion||p.desc||'';

  // Botón "Agregar" en modal
  const btnA=document.getElementById('btnAgregarModal');
  btnA.classList.remove('en-carrito');
  btnA.textContent='🛒 Agregar';

  hideFormulario();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
  productoActual=null;
}

function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();cerrarCarrito();}});

function showFormulario(){
  document.getElementById('modalDetalleActions').style.display='none';
  document.getElementById('modalFormWrap').style.display='block';
  document.getElementById('clienteNombre').value='';
  document.getElementById('clienteTel').value='';
  document.getElementById('clienteDireccion').value='';
  document.getElementById('clienteCant').value='1';
  document.getElementById('clienteNombre').focus();
}

function hideFormulario(){
  document.getElementById('modalFormWrap').style.display='none';
  document.getElementById('modalDetalleActions').style.display='flex';
}

function agregarDesdeModal(){
  if(!productoActual) return;
  agregarAlCarrito(productoActual.id);
  const btn=document.getElementById('btnAgregarModal');
  btn.classList.add('en-carrito');
  btn.textContent='✓ Agregado';
  showToast('✓ Producto agregado al carrito');
  setTimeout(()=>{btn.classList.remove('en-carrito');btn.textContent='🛒 Agregar';},1200);
}

function enviarPedido(){
  const nombre=document.getElementById('clienteNombre').value.trim();
  const tel=document.getElementById('clienteTel').value.trim();
  const dir=document.getElementById('clienteDireccion').value.trim();
  const cant=parseInt(document.getElementById('clienteCant').value)||1;

  if(!nombre){showToast('⚠️ Ingresá tu nombre');document.getElementById('clienteNombre').focus();return;}
  if(!tel){showToast('⚠️ Ingresá tu teléfono');document.getElementById('clienteTel').focus();return;}
  if(!dir){showToast('⚠️ Ingresá tu dirección');document.getElementById('clienteDireccion').focus();return;}
  if(!productoActual) return;

  const p=productoActual;
  const totalStr=p.precio?'*Total aprox.:* Gs. '+fmt(p.precio*cant):'';

  const msg=[
    '🛒 *Pedido desde el catálogo Iporãve*',
    '',
    '📦 *Producto:* '+p.nombre,
    p.precio?'💵 *Precio unitario:* Gs. '+fmt(p.precio):'',
    '🔢 *Cantidad:* '+cant,
    totalStr,
    '',
    '👤 *Nombre:* '+nombre,
    '📞 *Teléfono:* '+tel,
    '📍 *Dirección:* '+dir,
    '',
    '_Enviado desde iporãve.com_'
  ].filter(Boolean).join('\n');

  window.open('https://wa.me/'+WA_VENDEDOR+'?text='+encodeURIComponent(msg),'_blank','noopener');
  showToast('✅ Abriendo WhatsApp...');
  setTimeout(closeModal,1200);
}

// ─── CARGA DE PRODUCTOS ───────────────────────────────────────
async function cargar(){
  mostrarSkeletons();
  try{
    const res=await fetch(API+'/api/catalogo-publico');
    if(!res.ok) throw new Error('Error HTTP '+res.status);
    const data=await res.json();
    const lista=Array.isArray(data)?data
      :Array.isArray(data.productos)?data.productos
      :Array.isArray(data.data)?data.data
      :[];
    todosLosProductos=lista;
    poblarCategorias();
    filtrar();
  }catch(e){
    document.getElementById('grid').style.display='none';
    const el=document.getElementById('errorState');
    el.style.display='block';
    el.innerHTML='<div style="font-size:40px;margin-bottom:12px">⚠️</div>'
      +'<div style="font-size:15px;font-weight:700;margin-bottom:8px;color:#f87171">No se pudo cargar el catálogo</div>'
      +'<div style="font-size:13px;color:#64748b;margin-bottom:18px">Revisá tu conexión e intentá de nuevo.</div>'
      +'<button onclick="location.reload()" style="background:#1e2235;color:#e2e8f0;border:1px solid #334155;border-radius:10px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;">Reintentar</button>';
    document.getElementById('statsCount').textContent='';
  }
}

// ─── BOTÓN VOLVER ARRIBA ──────────────────────────────────────
(function(){
  const btn=document.getElementById('btnTop');
  window.addEventListener('scroll',()=>{
    if(window.scrollY>280) btn.classList.add('visible');
    else btn.classList.remove('visible');
  },{passive:true});
})();

// ─── INICIO ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',cargar);
</script>
