<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — Iporãve Connect</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d2e;
    --bg3: #252840;
    --accent: #6c63ff;
    --accent2: #4ecdc4;
    --text: #e8eaf6;
    --text2: #9fa8da;
    --border: #2a2d45;
    --card: #1e2235;
    --danger: #ef5350;
    --success: #66bb6a;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  :root.light {
    --bg: #f5f5f5;
    --bg2: #e8e8f0;
    --bg3: #d8d8e8;
    --text: #1a1a2e;
    --text2: #4a4a6a;
    --border: #c0c0d8;
    --card: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo { font-size: 1.5rem; }
  .brand { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .brand span { color: var(--text2); font-weight: 400; font-size: 0.85rem; display: block; }
  .header-spacer { flex: 1; }
  .btn-theme {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .btn-theme:hover { background: var(--bg3); border-color: var(--accent); }

  /* BARRA DE BÚSQUEDA */
  .search-bar {
    background: var(--bg2);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-bar input, .search-bar select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input { flex: 1; min-width: 200px; }
  .search-bar input:focus, .search-bar select:focus { border-color: var(--accent); }
  .search-bar select option { background: var(--bg3); }
  .search-bar input[type="number"] { min-width: 100px; flex: 1; }
  .search-bar select#selectOrden { min-width: 160px; flex: 1; }
  .precio-row { display: flex; gap: 10px; flex: 1; min-width: 220px; }
  .precio-row input { flex: 1; min-width: 0; }

  /* CONTADOR */
  .contador {
    padding: 12px 20px;
    color: var(--text2);
    font-size: 0.85rem;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    padding: 16px 20px 100px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(108,99,255,0.2); }
  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-nombre { font-weight: 600; font-size: 0.9rem; line-height: 1.3; color: var(--text); }
  .card-cat { font-size: 0.75rem; color: var(--text2); }
  .card-precio {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    margin-top: auto;
  }
  .card-precio-old {
    font-size: 0.8rem;
    color: var(--text2);
    text-decoration: line-through;
  }
  .btn-pedir {
    margin: 0 12px 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    width: calc(100% - 24px);
  }
  .btn-pedir:hover { background: #5a52e0; }
  .btn-compartir {
    margin: 0 12px 10px;
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    width: calc(100% - 24px);
  }
  .btn-compartir:hover { background: var(--accent2); color: #fff; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    grid-column: 1/-1;
  }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SKELETON LOADING */
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  .skeleton-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .skeleton-img {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(90deg, var(--bg3) 25%, #2e3150 50%, var(--bg3) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite linear;
  }
  .skeleton-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .skeleton-line {
    border-radius: 6px;
    background: linear-gradient(90deg, var(--bg3) 25%, #2e3150 50%, var(--bg3) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite linear;
  }
  .skeleton-line.title  { height: 14px; width: 80%; }
  .skeleton-line.cat    { height: 11px; width: 50%; }
  .skeleton-line.price  { height: 18px; width: 55%; margin-top: 6px; }
  .skeleton-btn {
    margin: 0 12px 12px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--bg3) 25%, #2e3150 50%, var(--bg3) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite linear;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 6px; }
  .modal .prod-info { color: var(--text2); font-size: 0.85rem; margin-bottom: 20px; }
  .modal label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancelar {
    flex: 1; padding: 10px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; font-size: 0.9rem;
  }
  .btn-whatsapp {
    flex: 2; padding: 10px; border-radius: 10px;
    border: none; background: #25d366;
    color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 700;
  }
  .btn-whatsapp:hover { background: #1da851; }

  /* MODAL DETALLE */
  .detalle-modal { padding: 0; overflow: hidden; }
  .detalle-img { width: 100%; height: 260px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
  .detalle-img img { width: 100%; height: 100%; object-fit: cover; }
  .detalle-body { padding: 24px; }
  .detalle-precios { margin: 12px 0; display: flex; align-items: baseline; gap: 10px; }
  .detalle-desc { color: var(--text2); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap; max-height: 30vh; overflow-y: auto; }
  .detalle-modal h2 { font-size: 1.3rem; margin-bottom: 4px; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 10px 80px; }
    .search-bar { padding: 12px; }
  }

  /* BOTÓN AGREGAR AL CARRITO */
  .btn-agregar {
    margin: 0 12px 10px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    width: calc(100% - 24px);
  }
  .btn-agregar:hover { background: var(--accent); color: #fff; }
  .btn-agregar.en-carrito { background: var(--accent); color: #fff; }

  /* ÍCONO FLOTANTE DEL CARRITO */
  .carrito-fab {
    position: fixed;
    top: 14px;
    right: 66px;
    z-index: 150;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(108,99,255,0.45);
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .carrito-fab:hover { background: #5a52e0; transform: scale(1.08); }
  .carrito-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--danger);
    color: #fff;
    border-radius: 50%;
    font-size: 0.65rem;
    font-weight: 700;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    display: none;
  }
  .carrito-badge.visible { display: flex; }

  /* DRAWER OVERLAY */
  .carrito-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 300;
  }
  .carrito-overlay.open { display: block; }

  /* DRAWER PANEL */
  .carrito-drawer {
    position: fixed;
    top: 0;
    right: -400px;
    width: 360px;
    max-width: 95vw;
    height: 100%;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 301;
    display: flex;
    flex-direction: column;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -4px 0 30px rgba(0,0,0,0.4);
  }
  .carrito-drawer.open { right: 0; }

  .carrito-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .carrito-titulo {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-cerrar-carrito {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  .btn-cerrar-carrito:hover { background: var(--bg3); }

  .carrito-lista {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .carrito-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .carrito-item-info { flex: 1; min-width: 0; }
  .carrito-item-nombre {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .carrito-item-precio {
    font-size: 0.8rem;
    color: var(--accent2);
    margin-top: 2px;
  }
  .carrito-item-cant {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .carrito-item-cant button {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .carrito-item-cant button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .carrito-item-cant span {
    font-size: 0.9rem;
    font-weight: 700;
    min-width: 18px;
    text-align: center;
  }
  .btn-quitar-item {
    background: transparent;
    border: none;
    color: var(--danger);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-quitar-item:hover { background: rgba(239,83,80,0.12); }

  .carrito-vacio {
    text-align: center;
    color: var(--text2);
    padding: 40px 20px;
    font-size: 0.95rem;
  }
  .carrito-vacio .icon { font-size: 2.5rem; margin-bottom: 10px; }

  .carrito-footer {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .carrito-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }
  .carrito-total-monto { color: var(--accent2); font-size: 1.1rem; }
  .btn-vaciar {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    border-radius: 8px;
    padding: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-vaciar:hover { background: var(--danger); color: #fff; }
  .btn-enviar-carrito {
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-enviar-carrito:hover { background: #1da851; }
</style>
</head>
<body>

<header>
  <div class="logo">🛵</div>
  <div class="brand">Iporãve Connect <span>Catálogo de productos</span></div>
  <div class="header-spacer"></div>
  <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="Cambiar modo"></button>
</header>

<div class="search-bar">
  <input type="text" id="inputBuscar" placeholder="🔍 Buscar producto..." oninput="filtrar()">
  <select id="selectCat" onchange="filtrar()">
    <option value="">Todas las categorías</option>
  </select>
  <div class="precio-row">
    <input type="number" id="inputMin" placeholder="Precio mín." oninput="filtrar()" min="0">
    <input type="number" id="inputMax" placeholder="Precio máx." oninput="filtrar()" min="0">
  </div>
  <select id="selectOrden" onchange="filtrar()">
    <option value="relevancia">Relevancia</option>
    <option value="precio_menor">Precio menor</option>
    <option value="precio_mayor">Precio mayor</option>
    <option value="nombre_az">Nombre A-Z</option>
  </select>
</div>

<div class="contador" id="contador"></div>

<div class="grid" id="grid"></div>

<!-- Ícono flotante del carrito -->
<button class="carrito-fab" id="carritoFab" onclick="abrirCarrito()" title="Ver carrito">
  🛒
  <span class="carrito-badge" id="carritoBadge">0</span>
</button>

<!-- Overlay del drawer -->
<div class="carrito-overlay" id="carritoOverlay" onclick="cerrarCarrito()"></div>

<!-- Drawer panel del carrito -->
<div class="carrito-drawer" id="carritoDrawer">
  <div class="carrito-header">
    <div class="carrito-titulo">🛒 Mi carrito</div>
    <button class="btn-cerrar-carrito" onclick="cerrarCarrito()">✕ Cerrar</button>
  </div>
  <div class="carrito-lista" id="carritoLista"></div>
  <div class="carrito-footer" id="carritoFooter">
    <div class="carrito-total">
      <span>Total</span>
      <span class="carrito-total-monto" id="carritoTotal">Gs. 0</span>
    </div>
    <button class="btn-vaciar" onclick="vaciarCarrito()">🗑 Vaciar carrito</button>
    <button class="btn-enviar-carrito" onclick="enviarCarritoPorWA()">📲 Enviar pedido por WhatsApp</button>
  </div>
</div>

<!-- Modal de detalle -->
<div class="modal-overlay" id="modalDetalle" onclick="cerrarModalDetalle(event)">
  <div class="modal detalle-modal">
    <div class="detalle-img"></div>
    <div class="detalle-body">
      <h2 id="detNombre"></h2>
      <div id="detCat" class="card-cat"></div>
      <div class="detalle-precios">
        <span id="detPrecioOld" class="card-precio-old"></span>
        <span id="detPrecio" class="card-precio"></span>
      </div>
      <div id="detDesc" class="detalle-desc"></div>
      <div class="modal-btns">
        <button class="btn-cancelar" onclick="cerrarModalDetalle()">Cerrar</button>
        <button class="btn-whatsapp" id="btnDetallePedir">📲 Pedir por WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de pedido -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
  <div class="modal">
    <h2>📦 Hacer pedido</h2>
    <div class="prod-info" id="modalProdInfo"></div>
    <label>Tu nombre</label>
    <input type="text" id="inputNombre" placeholder="Nombre completo">
    <label>Tu WhatsApp</label>
    <input type="tel" id="inputWA" placeholder="09xxxxxxxx">
    <label>Dirección de entrega</label>
    <input type="text" id="inputDir" placeholder="Barrio, calle, número...">
    <label>Cantidad</label>
    <input type="number" id="inputCant" value="1" min="1" max="99">
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-whatsapp" onclick="enviarPedido()">📲 Pedir por WhatsApp</button>
    </div>
  </div>
</div>

<script>
const API = 'https://iporave-api.iporaveparaguay.workers.dev/api/catalog-public';
const WA_EMPRESA = '595981000000'; // reemplazar con el número real de la empresa

let todosLosProductos = [];
let productoSeleccionado = null;

function mostrarSkeletons() {
  const grid = document.getElementById('grid');
  const sk = `
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line title"></div>
        <div class="skeleton-line cat"></div>
        <div class="skeleton-line price"></div>
      </div>
      <div class="skeleton-btn"></div>
    </div>`;
  grid.innerHTML = sk.repeat(6);
}

async function cargar() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    todosLosProductos = data.productos || [];
    poblarCategorias();
    renderizar(todosLosProductos);
  } catch (e) {
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="icon">⚠️</div>
        <div>No se pudieron cargar los productos.<br>Intentá de nuevo más tarde.</div>
      </div>`;
  }
}

function poblarCategorias() {
  const cats = [...new Set(todosLosProductos.map(p => p.categoria).filter(Boolean))].sort();
  const sel = document.getElementById('selectCat');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function filtrar() {
  const q = document.getElementById('inputBuscar').value.toLowerCase().trim();
  const cat = document.getElementById('selectCat').value;
  const min = parseInt(document.getElementById('inputMin').value);
  const max = parseInt(document.getElementById('inputMax').value);
  const orden = document.getElementById('selectOrden').value;

  let lista = [...todosLosProductos];
  if (cat) lista = lista.filter(p => p.categoria === cat);
  if (q) lista = lista.filter(p => p.nombre?.toLowerCase().includes(q) || p.descripcion?.toLowerCase().includes(q));
  if (!isNaN(min)) lista = lista.filter(p => p.precio >= min);
  if (!isNaN(max)) lista = lista.filter(p => p.precio <= max);

  if (orden === 'precio_menor') {
    lista.sort((a, b) => a.precio - b.precio);
  } else if (orden === 'precio_mayor') {
    lista.sort((a, b) => b.precio - a.precio);
  } else if (orden === 'nombre_az') {
    lista.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
  }

  renderizar(lista);
}

function renderizar(lista) {
  const grid = document.getElementById('grid');
  const contador = document.getElementById('contador');
  contador.textContent = lista.length === 1 ? '1 producto encontrado' : lista.length + ' productos encontrados';

  if (!lista.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">📦</div><div>No hay productos que coincidan</div></div>`;
    return;
  }

  grid.innerHTML = lista.map(p => `
    <div class="card" onclick="abrirModalDetalle(${p.id})">
      <div class="card-img">
        ${p.foto
          ? `<img src="${p.foto}" alt="${esc(p.nombre)}" loading="lazy" onerror="this.parentElement.innerHTML='📦'">`
          : '📦'}
      </div>
      <div class="card-body">
        <div class="card-nombre">${esc(p.nombre)}</div>
        ${p.categoria ? `<div class="card-cat">${esc(p.categoria)}</div>` : ''}
        ${p.precio_comparacion && p.precio_comparacion > p.precio
          ? `<div class="card-precio-old">Gs. ${fmt(p.precio_comparacion)}</div>` : ''}
        <div class="card-precio">Gs. ${fmt(p.precio)}</div>
      </div>
      <button class="btn-pedir" onclick="event.stopPropagation(); abrirModal(${p.id})">Pedir ahora</button>
      <button class="btn-agregar" data-id="${p.id}" onclick="event.stopPropagation(); agregarAlCarrito(${p.id})">🛒 Agregar</button>
      <button class="btn-compartir" onclick="event.stopPropagation(); compartirWA(${p.id})">📤 Compartir</button>
    </div>
  `).join('');
}

function abrirModal(id) {
  productoSeleccionado = todosLosProductos.find(p => p.id === id);
  if (!productoSeleccionado) return;
  document.getElementById('modalProdInfo').textContent =
    productoSeleccionado.nombre + ' — Gs. ' + fmt(productoSeleccionado.precio);
  document.getElementById('inputNombre').value = '';
  document.getElementById('inputWA').value = '';
  document.getElementById('inputDir').value = '';
  document.getElementById('inputCant').value = '1';
  document.getElementById('modalOverlay').classList.add('open');
}

function cerrarModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    productoSeleccionado = null;
  }
}

function abrirModalDetalle(id) {
  const p = todosLosProductos.find(p => p.id === id);
  if (!p) return;
  
  const imgCont = document.querySelector('#modalDetalle .detalle-img');
  imgCont.innerHTML = p.foto ? `<img src="${p.foto}" alt="${esc(p.nombre)}">` : '📦';
  
  document.getElementById('detNombre').textContent = p.nombre;
  document.getElementById('detCat').textContent = p.categoria || '';
  
  const oldP = document.getElementById('detPrecioOld');
  if (p.precio_comparacion && p.precio_comparacion > p.precio) {
    oldP.textContent = 'Gs. ' + fmt(p.precio_comparacion);
    oldP.style.display = 'inline';
  } else {
    oldP.style.display = 'none';
  }
  document.getElementById('detPrecio').textContent = 'Gs. ' + fmt(p.precio);
  document.getElementById('detDesc').textContent = p.descripcion || 'Sin descripción detallada.';
  
  const btn = document.getElementById('btnDetallePedir');
  btn.onclick = () => {
    cerrarModalDetalle();
    abrirModal(id);
  };
  
  document.getElementById('modalDetalle').classList.add('open');
}

function cerrarModalDetalle(e) {
  if (!e || e.target === document.getElementById('modalDetalle')) {
    document.getElementById('modalDetalle').classList.remove('open');
  }
}

function enviarPedido() {
  const nombre = document.getElementById('inputNombre').value.trim();
  const wa = document.getElementById('inputWA').value.trim();
  const dir = document.getElementById('inputDir').value.trim();
  const cant = document.getElementById('inputCant').value || '1';
  if (!nombre || !wa || !dir) { alert('Por favor completá todos los campos.'); return; }
  const p = productoSeleccionado;
  const msg = `Hola! Quiero hacer un pedido 🛵\n\n` +
    `*Producto:* ${p.nombre}\n` +
    `*Precio:* Gs. ${fmt(p.precio)}\n` +
    `*Cantidad:* ${cant}\n` +
    `*Total aprox.:* Gs. ${fmt(p.precio * parseInt(cant))}\n\n` +
    `*Datos de entrega:*\n` +
    `Nombre: ${nombre}\n` +
    `WhatsApp: ${wa}\n` +
    `Dirección: ${dir}`;
  const url = `https://wa.me/${WA_EMPRESA}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  cerrarModal();
}

function compartirWA(id) {
  const p = todosLosProductos.find(p => p.id === id);
  if (!p) return;
  const msg = `¡Mirá este producto en Iporãve! 👇\n${p.nombre} — Gs. ${fmt(p.precio)}\nVer catálogo: https://iporave-sistema.vercel.app/catalog.html`;
  const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) {
  return Number(n || 0).toLocaleString('es-PY');
}

// THEME TOGGLE
function aplicarTema(tema) {
  if (tema === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('btnTheme').textContent = '☀️';
  } else {
    document.documentElement.classList.remove('light');
    document.getElementById('btnTheme').textContent = '🌙';
  }
}

function toggleTheme() {
  const esLight = document.documentElement.classList.contains('light');
  const nuevoTema = esLight ? 'dark' : 'light';
  localStorage.setItem('iporave-theme', nuevoTema);
  aplicarTema(nuevoTema);
}

// Aplicar tema guardado al cargar
(function() {
  const temaGuardado = localStorage.getItem('iporave-theme') || 'dark';
  aplicarTema(temaGuardado);
})();

// ============================================================
// CARRITO DE COMPRAS
// ============================================================

const CARRITO_KEY = 'iporave-carrito';

// Cargar carrito desde localStorage al iniciar
let _carrito = [];
(function() {
  try {
    const guardado = localStorage.getItem(CARRITO_KEY);
    if (guardado) _carrito = JSON.parse(guardado) || [];
  } catch(e) { _carrito = []; }
  actualizarBadge();
})();

function guardarCarrito() {
  localStorage.setItem(CARRITO_KEY, JSON.stringify(_carrito));
}

function actualizarBadge() {
  const total = _carrito.reduce((acc, item) => acc + item.cantidad, 0);
  const badge = document.getElementById('carritoBadge');
  if (total > 0) {
    badge.textContent = total > 99 ? '99+' : total;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function agregarAlCarrito(id) {
  const p = todosLosProductos.find(p => p.id === id);
  if (!p) return;
  const existente = _carrito.find(item => item.id === id);
  if (existente) {
    existente.cantidad += 1;
  } else {
    _carrito.push({
      id: p.id,
      nombre: p.nombre,
      precio: p.precio,
      cantidad: 1
    });
  }
  guardarCarrito();
  actualizarBadge();
  // Feedback visual en el botón
  const btn = document.querySelector(`.btn-agregar[data-id="${id}"]`);
  if (btn) {
    btn.classList.add('en-carrito');
    btn.textContent = '✓ Agregado';
    setTimeout(() => {
      btn.classList.remove('en-carrito');
      btn.textContent = '🛒 Agregar';
    }, 1200);
  }
}

function cambiarCantidad(id, delta) {
  const item = _carrito.find(item => item.id === id);
  if (!item) return;
  item.cantidad += delta;
  if (item.cantidad <= 0) {
    _carrito = _carrito.filter(i => i.id !== id);
  }
  guardarCarrito();
  actualizarBadge();
  renderCarrito();
}

function quitarDelCarrito(id) {
  _carrito = _carrito.filter(item => item.id !== id);
  guardarCarrito();
  actualizarBadge();
  renderCarrito();
}

function vaciarCarrito() {
  if (!_carrito.length) return;
  if (!confirm('¿Vaciar todo el carrito?')) return;
  _carrito = [];
  guardarCarrito();
  actualizarBadge();
  renderCarrito();
}

function renderCarrito() {
  const lista = document.getElementById('carritoLista');
  const footer = document.getElementById('carritoFooter');

  if (!_carrito.length) {
    lista.innerHTML = `
      <div class="carrito-vacio">
        <div class="icon">🛒</div>
        <div>Tu carrito está vacío.<br>Agregá productos para continuar.</div>
      </div>`;
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'flex';

  lista.innerHTML = _carrito.map(item => `
    <div class="carrito-item">
      <div class="carrito-item-info">
        <div class="carrito-item-nombre">${esc(item.nombre)}</div>
        <div class="carrito-item-precio">Gs. ${fmt(item.precio)} c/u</div>
      </div>
      <div class="carrito-item-cant">
        <button onclick="cambiarCantidad(${item.id}, -1)" title="Quitar uno">−</button>
        <span>${item.cantidad}</span>
        <button onclick="cambiarCantidad(${item.id}, 1)" title="Agregar uno">+</button>
      </div>
      <button class="btn-quitar-item" onclick="quitarDelCarrito(${item.id})" title="Eliminar">✕</button>
    </div>
  `).join('');

  const total = _carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);
  document.getElementById('carritoTotal').textContent = 'Gs. ' + fmt(total);
}

function abrirCarrito() {
  renderCarrito();
  document.getElementById('carritoOverlay').classList.add('open');
  document.getElementById('carritoDrawer').classList.add('open');
}

function cerrarCarrito() {
  document.getElementById('carritoOverlay').classList.remove('open');
  document.getElementById('carritoDrawer').classList.remove('open');
}

function enviarCarritoPorWA() {
  if (!_carrito.length) { alert('El carrito está vacío.'); return; }
  const total = _carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);
  const lineas = _carrito.map(item =>
    `• ${item.nombre} x${item.cantidad} = Gs. ${fmt(item.precio * item.cantidad)}`
  ).join('\n');
  const msg = `Hola! Quiero hacer un pedido 🛵\n\n` +
    `*Productos:*\n${lineas}\n\n` +
    `*Total: Gs. ${fmt(total)}*\n\n` +
    `Por favor confirmame disponibilidad y datos de entrega. ¡Gracias!`;
  const url = `https://wa.me/${WA_EMPRESA}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

cargar();
