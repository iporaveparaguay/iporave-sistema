<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Página no encontrada | Iporãve</title>
  <style>
    /* ── Variables ── */
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --accent:   #6c63ff;
      --accent2:  #4ecdc4;
      --text:     #e8eaf0;
      --muted:    #7b7f93;
      --radius:   12px;
    }

    /* ── Reset / Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      text-align: center;
    }

    /* ── Número 404 flotante ── */
    .number-404 {
      font-size: clamp(6rem, 22vw, 13rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3.2s ease-in-out infinite;
      user-select: none;
      margin-bottom: 8px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-18px); }
    }

    /* ── Sombra que "respira" debajo del número ── */
    .shadow-blob {
      width: clamp(120px, 40vw, 260px);
      height: 18px;
      background: radial-gradient(ellipse, rgba(108,99,255,.35) 0%, transparent 70%);
      border-radius: 50%;
      animation: shadow-pulse 3.2s ease-in-out infinite;
      margin: 0 auto 40px;
    }

    @keyframes shadow-pulse {
      0%, 100% { transform: scaleX(1);    opacity: .6; }
      50%       { transform: scaleX(.65); opacity: .25; }
    }

    /* ── Contenido central ── */
    .content {
      max-width: 480px;
      width: 100%;
    }

    .title {
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .subtitle {
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── Botones ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    @media (min-width: 400px) {
      .buttons { flex-direction: row; justify-content: center; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 28px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      cursor: pointer;
      border: none;
      flex: 1;
      min-width: 0;
    }

    .btn:hover  { transform: translateY(-3px); opacity: .92; }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #857dff);
      color: #fff;
      box-shadow: 0 6px 24px rgba(108,99,255,.4);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--accent2);
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      border: 1.5px solid rgba(78,205,196,.25);
    }

    /* ── Divisor ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      margin: 48px auto 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      justify-content: center;
      font-size: .85rem;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color .15s ease;
    }

    footer a:hover { color: var(--accent2); }

    footer .sep {
      color: var(--muted);
      opacity: .35;
      user-select: none;
    }
  </style>
</head>
<body>

  <!-- Número animado -->
  <div class="number-404" aria-hidden="true">404</div>
  <div class="shadow-blob" aria-hidden="true"></div>

  <!-- Mensaje principal -->
  <main class="content">
    <h1 class="title">¡Oops! Esta página no existe 😕</h1>
    <p class="subtitle">El link puede estar roto o la página fue movida.</p>

    <!-- Botones de acción -->
    <nav class="buttons" aria-label="Opciones de navegación">
      <a href="/" class="btn btn-primary">🏠 Ir al inicio</a>
      <a href="/catalog.html" class="btn btn-secondary">📦 Ver catálogo</a>
    </nav>
  </main>

  <!-- Divisor decorativo -->
  <div class="divider" aria-hidden="true"></div>

  <!-- Footer -->
  <footer>
    <a href="/contacto.html">Contacto</a>
    <span class="sep">|</span>
    <a href="/terminos.html">Términos</a>
    <span class="sep">|</span>
    <a href="#faq">FAQ</a>
  </footer>

</body>
</html>
